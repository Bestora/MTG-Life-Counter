services:
  app:
    build:
      context: .
      args:
        # IMPORTANT: Set this to your server's public IP or domain!
        VITE_REVERB_HOST: "your-server-ip-or-domain"
        VITE_REVERB_PORT: "8080"
        VITE_REVERB_SCHEME: "http"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - app-data:/app/database
      - app-storage:/app/storage
    environment:
      APP_NAME: "MTG Life Counter"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost"

      DB_CONNECTION: sqlite

      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      BROADCAST_CONNECTION: reverb

      REVERB_APP_ID: 907704
      REVERB_APP_KEY: jiglychaz3ikfsxiamak
      REVERB_APP_SECRET: oiugpglkncvcw7oru2gp
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8080
      REVERB_SCHEME: http

      # These VITE_ vars were baked into assets at build time.
      # Override APP_URL and REVERB_HOST for your server's public IP/domain.
    restart: unless-stopped

volumes:
  app-data:
  app-storage:
